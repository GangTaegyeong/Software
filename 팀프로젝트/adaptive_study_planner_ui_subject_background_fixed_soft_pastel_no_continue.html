<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Study Planner</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-soft: #f9fafb;
      --line: #e5e7eb;
      --line-strong: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --muted-soft: #9ca3af;
      --primary: #4f46e5;
      --primary-soft: #f1f2ff;
      --danger: #dc6868;
      --danger-soft: #fff5f5;
      --warning: #b7791f;
      --warning-soft: #fffaf0;
      --success: #2f855a;
      --success-soft: #f0fff4;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.045);
      --shadow-hover: 0 12px 28px rgba(15, 23, 42, 0.07);
      --radius-xl: 22px;
      --radius-lg: 18px;
      --radius-md: 12px;
    }

    html[data-theme="dark"] {
      --bg: #0f172a;
      --surface: #111827;
      --surface-soft: #162033;
      --line: #263349;
      --line-strong: #3b4a64;
      --text: #f8fafc;
      --muted: #a5b4c7;
      --muted-soft: #8190a6;
      --primary: #a5b4fc;
      --primary-soft: rgba(165, 180, 252, 0.12);
      --danger: #fca5a5;
      --danger-soft: rgba(252, 165, 165, 0.10);
      --warning: #facc15;
      --warning-soft: rgba(250, 204, 21, 0.10);
      --success: #86efac;
      --success-soft: rgba(134, 239, 172, 0.10);
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.20);
      --shadow-hover: 0 16px 34px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .page {
      max-width: 1220px;
      margin: 0 auto;
      padding: 28px 20px 44px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      align-items: start;
      gap: 22px;
      margin-bottom: 18px;
      padding: 30px;
      background: var(--surface);
    }

    .app-title {
      margin: 0;
      color: var(--primary);
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1.02;
      letter-spacing: -0.035em;
      font-weight: 850;
    }

    .subtitle {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
      max-width: 760px;
    }

    .top-controls {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .mode-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .day-nav {
      display: grid;
      grid-template-columns: auto minmax(150px, 1fr) auto;
      align-items: center;
      gap: 7px;
      padding: 7px;
      border-radius: 16px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
    }

    .day-btn,
    .icon-btn,
    .pill-btn,
    .primary-btn,
    .ghost-btn,
    .toggle-btn,
    .today-nav-btn {
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--surface);
      color: var(--text);
      font-weight: 750;
      transition: background 0.14s ease, color 0.14s ease, border-color 0.14s ease, transform 0.14s ease, box-shadow 0.14s ease;
    }

    .day-btn:hover,
    .icon-btn:hover,
    .pill-btn:hover,
    .ghost-btn:hover,
    .toggle-btn:hover {
      border-color: var(--line-strong);
      background: var(--surface-soft);
      transform: translateY(-1px);
    }

    .day-btn { padding: 9px 11px; font-size: 12px; white-space: nowrap; }
    .toggle-btn { padding: 10px 12px; font-size: 12px; }

    .selected-date {
      text-align: center;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
      padding: 0 4px;
    }

    .today-nav-btn {
      grid-column: 1 / -1;
      width: 100%;
      padding: 9px 12px;
      background: var(--primary-soft);
      color: var(--primary);
      border-color: transparent;
      font-size: 12px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric-card { padding: 17px; min-height: 112px; }

    .metric-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .metric-value {
      margin-top: 11px;
      font-size: 28px;
      font-weight: 850;
      letter-spacing: -0.045em;
    }

    .metric-help { margin-top: 8px; color: var(--muted); font-size: 12px; line-height: 1.48; }

    .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--primary); box-shadow: 0 0 0 4px var(--primary-soft); }
    .dot.success { background: var(--success); box-shadow: 0 0 0 4px var(--success-soft); }
    .dot.warning { background: var(--warning); box-shadow: 0 0 0 4px var(--warning-soft); }
    .dot.danger { background: var(--danger); box-shadow: 0 0 0 4px var(--danger-soft); }

    .calendar-card { padding: 20px; margin-bottom: 18px; }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 15px;
    }

    .section-title { margin: 0; font-size: 20px; letter-spacing: -0.035em; font-weight: 820; }
    .section-caption { margin: 5px 0 0; color: var(--muted); font-size: 12.5px; line-height: 1.45; }

    .calendar-nav { display: flex; align-items: center; gap: 8px; }
    .icon-btn { width: 34px; height: 34px; display: grid; place-items: center; font-size: 17px; }
    .month-label { min-width: 138px; text-align: center; font-size: 14px; font-weight: 820; }

    .selected-day-summary {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: -2px 0 15px;
      padding: 11px 13px;
      border-radius: 14px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }
    .selected-day-summary strong { color: var(--text); font-size: 13px; }

    .calendar-weekdays,
    .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 8px; }
    .calendar-weekdays { margin-bottom: 8px; }
    .weekday { text-align: center; color: var(--muted-soft); font-size: 11px; font-weight: 760; padding: 5px 0; }

    .day-cell {
      min-height: 112px;
      padding: 10px;
      border-radius: 15px;
      border: 1px solid var(--line);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      gap: 7px;
      text-align: left;
      color: var(--text);
      width: 100%;
      box-shadow: none;
    }
    .day-cell:hover { border-color: var(--line-strong); background: var(--surface-soft); transform: translateY(-1px); }
    .day-cell.muted { opacity: 0.42; background: var(--surface-soft); }
    .day-cell.today { border-color: rgba(79, 70, 229, 0.35); box-shadow: inset 0 0 0 1px rgba(79, 70, 229, 0.16); }
    .day-cell.selected { border-color: var(--primary); box-shadow: inset 0 0 0 2px rgba(79, 70, 229, 0.20); }

    .day-number { display: flex; align-items: center; justify-content: space-between; gap: 6px; font-size: 13px; font-weight: 830; }
    .today-chip { padding: 3px 7px; border-radius: 999px; background: var(--primary-soft); color: var(--primary); font-size: 10px; font-weight: 850; }

    .badge-stack { display: grid; gap: 5px; margin-top: auto; }
    .mini-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      max-width: 100%;
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 750;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid transparent;
    }
    .mini-badge.primary { background: var(--primary-soft); color: var(--primary); }
    .mini-badge.success { background: var(--success-soft); color: var(--success); }
    .mini-badge.warning { background: var(--warning-soft); color: var(--warning); }
    .mini-badge.danger { background: var(--danger-soft); color: var(--danger); }
    .mini-badge.gray { background: var(--surface-soft); color: var(--muted); border-color: var(--line); }

    .content-grid {
      display: grid;
      grid-template-columns: 230px minmax(0, 1.42fr) 300px;
      gap: 16px;
      align-items: start;
    }

    .panel { padding: 18px; }
    .subject-panel { position: sticky; top: 18px; max-height: calc(100vh - 36px); overflow: auto; }
    .subject-board { display: grid; gap: 9px; }

    .subject-card,
    .priority-card,
    .task-row,
    .focus-block {
      border: 1px solid var(--line);
      color: var(--text);
      box-shadow: none;
    }

    .subject-card {
      width: 100%;
      border-radius: 15px;
      padding: 13px;
      text-align: left;
      transition: border-color 0.14s ease, transform 0.14s ease, box-shadow 0.14s ease;
    }
    .subject-card:hover { border-color: var(--line-strong); transform: translateY(-1px); box-shadow: var(--shadow); }
    .subject-card.active { border-color: var(--primary); box-shadow: inset 0 0 0 1px rgba(79, 70, 229, 0.16); }

    .subject-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 7px; }
    .subject-name { font-size: 13.5px; font-weight: 830; letter-spacing: -0.02em; }
    .subject-count { padding: 4px 8px; border-radius: 999px; background: rgba(255,255,255,0.72); color: var(--text); font-size: 10.5px; font-weight: 800; white-space: nowrap; border: 1px solid rgba(17,24,39,0.04); }
    html[data-theme="dark"] .subject-count { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.08); }
    .subject-stat { color: var(--muted); font-size: 11.5px; line-height: 1.45; margin-bottom: 8px; }
    .subject-preview { display: grid; gap: 4px; }
    .subject-preview-item { display: block; color: var(--muted); font-size: 11.5px; line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .priority-reason { margin: 7px 0 9px; color: var(--muted); font-size: 11.5px; line-height: 1.5; }
    .rank-label { display: inline-flex; align-items: center; gap: 7px; margin-bottom: 10px; }
    .rank-label .rank { margin-bottom: 0; }
    .rank-text { color: var(--muted); font-size: 12px; font-weight: 780; }

    .top-three { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 16px; }
    .priority-card { border-radius: 16px; padding: 15px; }
    .rank { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 9px; background: #111827; color: #fff; font-size: 12px; font-weight: 850; margin-bottom: 10px; }
    html[data-theme="dark"] .rank { background: #f8fafc; color: #111827; }
    .priority-card h3 { margin: 0 0 9px; font-size: 15px; line-height: 1.42; letter-spacing: -0.02em; font-weight: 820; }

    .chip-row,
    .task-meta { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { display: inline-flex; align-items: center; padding: 5px 8px; border-radius: 999px; font-size: 11px; font-weight: 750; background: var(--surface); color: var(--muted); border: 1px solid var(--line); }
    .chip.danger { background: var(--danger-soft); color: var(--danger); border-color: transparent; }
    .chip.warning { background: var(--warning-soft); color: var(--warning); border-color: transparent; }
    .chip.success { background: var(--success-soft); color: var(--success); border-color: transparent; }
    .chip.primary { background: var(--primary-soft); color: var(--primary); border-color: transparent; }

    .filter-tabs { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 11px; }
    .pill-btn,
    .primary-btn,
    .ghost-btn { padding: 9px 11px; font-size: 12px; }
    .pill-btn.active { background: var(--primary-soft); color: var(--primary); border-color: transparent; }
    .primary-btn { border-color: transparent; background: var(--primary); color: #fff; }
    .primary-btn:hover { filter: brightness(0.98); transform: translateY(-1px); box-shadow: var(--shadow); }
    .ghost-btn { background: var(--surface-soft); color: var(--muted); }
    .pill-btn.delete { background: var(--danger-soft); color: var(--danger); border-color: transparent; }

    .toolbar { display: grid; grid-template-columns: minmax(0, 1fr) 145px 155px; gap: 9px; margin-bottom: 13px; }
    .input,
    .select { width: 100%; padding: 11px 12px; border-radius: 12px; border: 1px solid var(--line); background: var(--surface); color: var(--text); outline: none; font-size: 13px; }
    .input:focus,
    .select:focus { border-color: rgba(79, 70, 229, 0.38); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.07); }

    .task-list { display: grid; gap: 9px; }
    .task-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 14px; align-items: center; border-radius: 16px; padding: 14px; }
    .task-row.is-done { opacity: 0.56; }
    .task-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .task-main h4 { margin: 0; font-size: 15px; letter-spacing: -0.02em; font-weight: 820; }
    .task-main p { margin: 0 0 8px; font-size: 12px; line-height: 1.5; color: var(--muted); }

    .progress-wrap { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; margin-top: 9px; }
    .progress-track { height: 6px; border-radius: 999px; background: rgba(17,24,39,0.06); overflow: hidden; border: 0; }
    html[data-theme="dark"] .progress-track { background: rgba(255,255,255,0.12); }
    .progress-bar { height: 100%; border-radius: inherit; background: var(--primary); opacity: 0.78; }
    .progress-text { font-size: 11.5px; font-weight: 800; color: var(--muted); }
    .task-actions { display: flex; flex-wrap: wrap; gap: 7px; justify-content: flex-end; }

    .right-stack { display: grid; gap: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    label { display: grid; gap: 6px; font-size: 11.5px; font-weight: 780; color: var(--muted); }
    .range-value { color: var(--primary); font-weight: 850; }
    input[type="range"] { width: 100%; accent-color: var(--primary); }

    .palette-wrap { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
    .palette-btn { min-height: 30px; border-radius: 999px; border: 1px solid transparent; display: grid; place-items: center; color: transparent !important; font-size: 0; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.72); }
    .palette-btn.active { border-color: var(--primary) !important; box-shadow: inset 0 0 0 3px rgba(255,255,255,0.72), 0 0 0 2px rgba(79,70,229,0.10); }
    .palette-note { margin: 2px 0 0; color: var(--muted); font-size: 11px; line-height: 1.45; }
    .palette-wrap.disabled { opacity: 0.48; pointer-events: none; }

    .focus-blocks { display: grid; gap: 9px; margin-top: 6px; }
    .focus-block { display: grid; grid-template-columns: 58px minmax(0, 1fr) auto; gap: 9px; align-items: center; padding: 11px; border-radius: 15px; }
    .focus-time { font-size: 12px; font-weight: 820; color: var(--primary); }
    .focus-task { font-size: 12.5px; font-weight: 760; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .empty-state { padding: 26px 16px; border: 1px dashed var(--line-strong); border-radius: 16px; text-align: center; color: var(--muted); background: var(--surface-soft); font-size: 13px; }

    .toast { position: fixed; right: 20px; bottom: 20px; max-width: 420px; padding: 13px 15px; border-radius: 15px; background: #111827; color: #fff; box-shadow: var(--shadow-hover); transform: translateY(120%); opacity: 0; transition: transform 0.2s ease, opacity 0.2s ease; z-index: 100; font-size: 13px; line-height: 1.45; }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 1120px) {
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .content-grid { grid-template-columns: 1fr; }
      .subject-panel { position: static; max-height: none; }
      .subject-board { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .top-three { grid-template-columns: 1fr; }
    }

    @media (max-width: 860px) {
      .hero { grid-template-columns: 1fr; padding: 24px; }
      .top-controls { width: 100%; }
      .day-nav { width: 100%; grid-template-columns: 1fr auto 1fr; }
      .calendar-grid { gap: 7px; }
      .day-cell { min-height: 102px; }
      .toolbar { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .form-actions { grid-template-columns: 1fr; }
      .subject-board { grid-template-columns: 1fr; }
      .task-row { grid-template-columns: 1fr; }
      .task-actions { justify-content: flex-start; }
      .focus-block { grid-template-columns: 1fr; }
      .section-header { align-items: flex-start; flex-direction: column; }
    }

    @media (max-width: 640px) {
      .page { padding: 18px 14px 30px; }
      .summary-grid { grid-template-columns: 1fr; }
      .calendar-weekdays, .calendar-grid { gap: 5px; }
      .weekday { font-size: 10.5px; }
      .day-cell { min-height: 84px; padding: 9px; }
      .month-label { min-width: auto; }
      .palette-wrap { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }
  </style>

  </style>


  <style id="calm-studio-redesign">
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface-soft: #f8f9fb;
      --line: #e7e9ee;
      --text: #202631;
      --muted: #727b8a;
      --primary: #4f46e5;
      --primary-soft: #f0f1ff;
      --shadow: 0 6px 22px rgba(16, 24, 40, 0.045);
    }

    * {
      letter-spacing: -0.012em;
    }

    body {
      background: var(--bg);
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      font-weight: 350;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 1240px;
      padding: 22px 18px 36px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      background: #ffffff;

    function getSavedSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(SETTINGS_STORAGE_KEY) || "{}");
        return { theme: saved.theme || "light", language: saved.language || "ko" };
      } catch {
        return { theme: "light", language: "ko" };
      }
    }

    let settings = getSavedSettings();
    let lang = settings.language;
    let selectedColorKey = PASTEL_COLORS[0].key;
    let subjectColors = loadSubjectColors();

    function t(key, values = {}) {
      let text = I18N[lang][key] ?? I18N.ko[key] ?? key;
      Object.entries(values).forEach(([k, v]) => text = text.replace(`{${k}}`, v));
      return text;
    }

    function makeId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") return window.crypto.randomUUID();
      return `task-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function pad2(value) { return String(value).padStart(2, "0"); }
    function todayKey() { return formatDateKey(new Date()); }
    function isValidDateKey(key) { return /^\d{4}-\d{2}-\d{2}$/.test(String(key || "")); }
    function parseDateKey(key) {
      const [year, month, day] = String(key).split("-").map(Number);
      if (!year || !month || !day) return new Date();
      return new Date(year, month - 1, day);
    }
    function dateOnly(date) {
      const d = date instanceof Date ? new Date(date) : parseDateKey(String(date));
      d.setHours(0, 0, 0, 0);
      return d;
    }
    function formatDateKey(date) {
      const d = date instanceof Date ? dateOnly(date) : parseDateKey(String(date));
      return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
    }
    function addDaysToKey(key, amount) {
      const d = parseDateKey(key);
      d.setDate(d.getDate() + amount);
      return formatDateKey(d);
    }
    function startOfMonthKey(key) {
      const d = parseDateKey(key);
      return new Date(d.getFullYear(), d.getMonth(), 1);
    }
    function formatDate(key, options = {}) {
      const locale = lang === "ko" ? "ko-KR" : "en-US";
      const defaults = lang === "ko"
        ? { year: "numeric", month: "long", day: "numeric", weekday: "long" }
        : { year: "numeric", month: "long", day: "numeric", weekday: "long" };
      return parseDateKey(key).toLocaleDateString(locale, { ...defaults, ...options });
    }
    function formatShortDate(key) {
      return parseDateKey(key).toLocaleDateString(lang === "ko" ? "ko-KR" : "en-US", { month: "short", day: "numeric", weekday: "short" });
    }
    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function loadSubjectColors() {
      try {
        const saved = JSON.parse(localStorage.getItem(COLOR_STORAGE_KEY) || "{}");
        return saved && typeof saved === "object" ? saved : {};
      } catch {
        return {};
      }
    }
    function saveSubjectColors() { localStorage.setItem(COLOR_STORAGE_KEY, JSON.stringify(subjectColors)); }
    function getColorByKey(key) { return PASTEL_COLORS.find(c => c.key === key) || PASTEL_COLORS[0]; }
    function getSubjectColorKey(subject) {
      if (!subjectColors[subject]) {
        const index = Object.keys(subjectColors).length % PASTEL_COLORS.length;
        subjectColors[subject] = PASTEL_COLORS[index].key;
        saveSubjectColors();
      }
      return subjectColors[subject];
    }
    function getSubjectColor(subject) { return getColorByKey(getSubjectColorKey(subject || "기타")); }
    function subjectStyle(subject) {
      const c = getSubjectColor(subject);
      if (settings.theme === "dark") {
        return `background:${c.darkBg} !important; border-color:${c.darkBorder}; color:var(--text);`;
      }
      return `background:${c.bg} !important; border-color:${c.border}; color:var(--text);`;
    }
    function subjectChipStyle(subject) {
      const c = getSubjectColor(subject);
      if (settings.theme === "dark") {
        return `background:${c.darkBg}; border-color:${c.darkBorder}; color:${c.darkText};`;
      }
      return `background:${c.bg}; border-color:${c.border}; color:${c.text};`;
    }

    function normalizeTask(task) {
      const rawDue = task.due || task.dueDate || task.date || todayKey();
      const normalizedDue = isValidDateKey(rawDue) ? rawDue : formatDateKey(parseDateKey(rawDue));
      return {
        id: task.id || makeId(),
        title: task.title || task.name || "Untitled",
        subject: task.subject || "General",
        due: normalizedDue,
        progress: Number.isFinite(Number(task.progress)) ? Number(task.progress) : 0,
        importance: Number.isFinite(Number(task.importance)) ? Number(task.importance) : 3,
        hours: Number.isFinite(Number(task.hours || task.estimatedHours)) ? Number(task.hours || task.estimatedHours) : 1,
        slot: task.slot || task.preferredTime || "저녁",
        postponed: Number.isFinite(Number(task.postponed || task.postponedCount)) ? Number(task.postponed || task.postponedCount) : 0,
        done: Boolean(task.done ?? task.completed)
      };
    }

    function loadTasks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed.map(normalizeTask) : [];
      } catch {
        return [];
      }
    }

    let tasks = loadTasks();
    let selectedDateKey = todayKey();
    let currentMonth = startOfMonthKey(selectedDateKey);
    let activeFilter = "all";
    let editingTaskId = null;

    function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
    function saveSettings() { localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(settings)); }

    function dayDiffFromReference(dueKey, referenceKey = todayKey()) {
      return Math.round((parseDateKey(dueKey) - parseDateKey(referenceKey)) / (1000 * 60 * 60 * 24));
    }
    function adaptiveScore(task, referenceKey = todayKey()) {
      if (task.done) return -1;
      const days = dayDiffFromReference(task.due, referenceKey);
      const ddayScore = days < 0 ? 18 : days === 0 ? 60 : Math.max(0, 48 - days * 6);
      const importanceScore = Number(task.importance) * 8;
      const progressPenalty = Math.round((100 - Number(task.progress)) / 4);
      const postponePenalty = Number(task.postponed || 0) * 9;
      const hoursBoost = Number(task.hours || 1) >= 3 ? 5 : 0;
      return ddayScore + importanceScore + progressPenalty + postponePenalty + hoursBoost;
    }
    function riskLevel(task, referenceKey = todayKey()) {
      if (task.done) return "success";
      const days = dayDiffFromReference(task.due, referenceKey);
      const score = adaptiveScore(task, referenceKey);
      if (days <= 1 || score >= 95 || (days <= 3 && Number(task.progress) < 35)) return "danger";
      if (days <= 5 || score >= 70 || Number(task.postponed || 0) >= 2) return "warning";
      return "success";
    }
    function ddayLabel(task, referenceKey = todayKey()) {
      const days = dayDiffFromReference(task.due, referenceKey);
      if (days < 0) return `D+${Math.abs(days)}`;
      if (days === 0) return "D-Day";
      return `D-${days}`;
    }
    function importanceText(value) {
      if (Number(value) >= 5) return t("importanceHigh");
      if (Number(value) >= 3) return t("importanceMid");
      return t("importanceLow");
    }
    function localizedSlot(slot) {
      const map = { "오전": t("morning"), "오후": t("afternoon"), "저녁": t("evening"), "야간": t("night") };
      return map[slot] || slot;
    }
    function slotTime(slot) {
      return { "오전": "09:00", "오후": "14:00", "저녁": "19:00", "야간": "22:00" }[slot] || "19:00";
    }

    function getSortedTasks(inputTasks) {
      const copied = [...inputTasks];
      const mode = els.sortMode.value;
      if (mode === "due") return copied.sort((a, b) => parseDateKey(a.due) - parseDateKey(b.due));
      if (mode === "progress") return copied.sort((a, b) => Number(a.progress) - Number(b.progress));
      return copied.sort((a, b) => {
        if (a.done && !b.done) return 1;
        if (!a.done && b.done) return -1;
        const scoreDiff = adaptiveScore(b) - adaptiveScore(a);
        if (scoreDiff !== 0) return scoreDiff;
        const dueDiff = parseDateKey(a.due) - parseDateKey(b.due);
        if (dueDiff !== 0) return dueDiff;
        return String(a.title).localeCompare(String(b.title), lang === "ko" ? "ko" : "en");
      });
    }

    function getTaskReason(task) {
      const days = dayDiffFromReference(task.due);
      if (days <= 1) return t("dueSoon");
      if (Number(task.postponed) >= 2) return t("postponeAlert");
      if (Number(task.importance) >= 4) return t("highImportance");
      if (Number(task.progress) < 40) return t("lowProgress");
      return t("recommendedStudy");
    }

    function filteredTasks() {
      let filtered = [...tasks];
      const searchTerm = els.searchInput.value.toLowerCase().trim();
      if (searchTerm) return filtered.filter(task => `${task.title} ${task.subject}`.toLowerCase().includes(searchTerm));
      if (activeFilter === "todo") filtered = filtered.filter(task => !task.done);
      else if (activeFilter === "done") filtered = filtered.filter(task => task.done);
      else if (activeFilter === "selected") filtered = filtered.filter(task => task.due === selectedDateKey);
      else if (activeFilter !== "all") filtered = filtered.filter(task => task.subject === activeFilter);
      const subjectFilterValue = els.subjectFilter.value;
      if (subjectFilterValue && subjectFilterValue !== "all") filtered = filtered.filter(task => task.subject === subjectFilterValue);
      return filtered;
    }

    function applyStaticText() {
      els.html.lang = lang;
      els.html.dataset.theme = settings.theme;
      document.querySelectorAll("[data-i18n]").forEach(node => node.textContent = t(node.dataset.i18n));
      els.themeToggleBtn.textContent = settings.theme === "dark" ? t("themeLight") : t("themeDark");
      els.languageToggleBtn.textContent = t("languageButton");
      els.searchInput.placeholder = t("searchPlaceholder");
      els.taskTitle.placeholder = t("taskTitlePlaceholder");
      els.taskSubject.placeholder = t("subjectPlaceholder");
      els.prevMonthBtn.setAttribute("aria-label", t("prevMonth"));

      els.taskImportance.innerHTML = `

        <option value="1">${t("importanceLow")}</option>`;
      els.taskHours.innerHTML = `

        <option value="2">${t("h2")}</option>
        <option value="3">${t("h3")}</option>
        <option value="4">${t("h4")}</option>`;
      els.taskSlot.innerHTML = `
        <option value="오전">${t("morning")}</option>
        <option value="오후">${t("afternoon")}</option>
        <option value="저녁" selected>${t("evening")}</option>
        <option value="야간">${t("night")}</option>`;
      els.sortMode.innerHTML = `

        <option value="due">${t("sortDue")}</option>

    }

    function renderSubjectFilter() {
      const current = els.subjectFilter.value;
      const subjects = [...new Set(tasks.map(task => task.subject).filter(Boolean))].sort();
      els.subjectFilter.innerHTML = `<option value="all">${t("allSubjects")}</option>` + subjects.map(subject => `<option value="${escapeHtml(subject)}">${escapeHtml(subject)}</option>`).join("");
      if (subjects.includes(current)) els.subjectFilter.value = current;
    }

    function renderPalette() {
      const subject = els.taskSubject.value.trim();
      const existingColorKey = subjectColors[subject];
      if (existingColorKey) selectedColorKey = existingColorKey;
      els.subjectColorPalette.classList.toggle("disabled", Boolean(existingColorKey) || Boolean(editingTaskId));
      els.subjectColorNote.textContent = existingColorKey || editingTaskId ? t("paletteExisting") : t("paletteNew");
      els.subjectColorPalette.innerHTML = PASTEL_COLORS.map((color, index) => `
        <button class="palette-btn ${color.key === selectedColorKey ? "active" : ""}" type="button" data-color-key="${color.key}" style="background:${color.bg}; border-color:${color.key === selectedColorKey ? 'var(--primary)' : color.border}; color:${color.text};">${index + 1}</button>
      `).join("");
    }

    function renderSummary() {
      const selectedTasks = tasks.filter(task => task.due === selectedDateKey);
      const total = selectedTasks.length;
      const done = selectedTasks.filter(task => task.done).length;
      const completion = total ? Math.round((done / total) * 100) : 0;
      els.completionRate.textContent = `${completion}%`;
      if (!total) els.completionMessage.textContent = t("noPlan");
      else if (completion === 100) els.completionMessage.textContent = t("allDoneMsg");
      else els.completionMessage.textContent = t("partialDone", { total, done });

      const urgent = tasks.filter(task => !task.done && dayDiffFromReference(task.due) >= 0 && dayDiffFromReference(task.due) <= 2).length;
      const postponed = tasks.filter(task => !task.done && Number(task.postponed) >= 2).length;
      els.urgentCount.textContent = lang === "ko" ? `${urgent}개` : String(urgent);
      els.postponeCount.textContent = lang === "ko" ? `${postponed}개` : String(postponed);

      const top = getSortedTasks(tasks.filter(task => !task.done))[0];
      els.focusTime.textContent = top ? localizedSlot(top.slot) : "-";
    }

    function renderCalendar() {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      els.monthLabel.textContent = parseDateKey(`${year}-${pad2(month + 1)}-01`).toLocaleDateString(lang === "ko" ? "ko-KR" : "en-US", { year: "numeric", month: "long" });
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      let html = "";
      for (let i = 0; i < firstDay.getDay(); i++) html += `<div class="day-cell muted"></div>`;
      for (let day = 1; day <= lastDay.getDate(); day++) {
        const dateKey = formatDateKey(new Date(year, month, day));
        const dayTasks = tasks.filter(task => task.due === dateKey);
        const badges = dayTasks.slice(0, 3).map(task => `<span class="mini-badge" style="${subjectChipStyle(task.subject)}">${escapeHtml(task.title)}</span>`).join("");
        const more = dayTasks.length > 3 ? `<span class="mini-badge gray">+${dayTasks.length - 3}</span>` : "";
        html += `
          <button class="day-cell ${dateKey === todayKey() ? "today" : ""} ${dateKey === selectedDateKey ? "selected" : ""}" type="button" data-date="${dateKey}">
            <div class="day-number"><span>${day}</span>${dateKey === todayKey() ? `<span class="today-chip">${t("today")}</span>` : ""}</div>
            <div class="badge-stack">${badges}${more}</div>
          </button>`;
      }
      els.calendarGrid.innerHTML = html;
      els.selectedDateLabel.textContent = formatDate(selectedDateKey);
      const selectedTasks = tasks.filter(task => task.due === selectedDateKey);
      if (!selectedTasks.length) els.selectedDaySummary.innerHTML = `<strong>${formatDate(selectedDateKey)}</strong>: ${t("noneOnDate")}`;
      else {
        const done = selectedTasks.filter(task => task.done).length;
        const chips = selectedTasks.slice(0, 4).map(task => `<span class="mini-badge" style="${subjectChipStyle(task.subject)}">${escapeHtml(task.subject)} · ${escapeHtml(task.title)}</span>`).join("");
        els.selectedDaySummary.innerHTML = `<strong>${formatDate(selectedDateKey)}</strong>: ${t("totalItems", { total: selectedTasks.length, done })} ${chips}`;
      }
    }

    function renderSubjectBoard() {
      const subjects = [...new Set(tasks.map(task => task.subject))].sort();
      if (!subjects.length) {
        els.subjectBoard.innerHTML = `<div class="empty-state">${t("noSubject")}</div>`;
        return;
      }
      els.subjectBoard.innerHTML = subjects.map(subject => {
        const subjectTasks = tasks.filter(task => task.subject === subject);
        const doneCount = subjectTasks.filter(task => task.done).length;
        const pending = getSortedTasks(subjectTasks.filter(task => !task.done)).slice(0, 3);
        const preview = pending.length
          ? pending.map(task => `<span class="subject-preview-item">• ${escapeHtml(task.title)}</span>`).join("")
          : `<span class="subject-preview-item">${doneCount === subjectTasks.length ? t("subjectDone") : t("noPending")}</span>`;
        return `
          <button class="subject-card ${activeFilter === subject ? "active" : ""}" type="button" data-subject="${escapeHtml(subject)}" style="${subjectStyle(subject)}">
            <div class="subject-head"><span class="subject-name">${escapeHtml(subject)}</span><span class="subject-count">${t("doneOf", { done: doneCount, total: subjectTasks.length })}</span></div>
            <div class="subject-stat">${t("progressText")}: ${subjectTasks.length ? Math.round((doneCount / subjectTasks.length) * 100) : 0}%</div>
            <div class="subject-preview">${preview}</div>
          </button>`;
      }).join("");
    }

    function renderTopThree() {
      const top3 = getSortedTasks(filteredTasks().filter(task => !task.done)).slice(0, 3);
      if (!top3.length) {
        els.topThree.innerHTML = `<div class="empty-state" style="grid-column:1 / -1;">${t("noTop3")}</div>`;
        return;
      }
      els.topThree.innerHTML = top3.map((task, index) => {
        const level = riskLevel(task);
        return `
          <article class="priority-card" style="${subjectStyle(task.subject)}">
            <div class="rank-label"><div class="rank">${index + 1}</div><span class="rank-text">${t("recommendation")}</span></div>
            <h3>${escapeHtml(task.title)}</h3>
            <div class="chip-row">
              <span class="chip ${level}">${ddayLabel(task)}</span>
              <span class="chip" style="${subjectChipStyle(task.subject)}">${escapeHtml(task.subject)}</span>
              <span class="chip">${getTaskReason(task)}</span>
            </div>
            <div class="priority-reason">${task.hours}${lang === "ko" ? "시간 소요 예상" : "h estimated"} · ${localizedSlot(task.slot)}</div>
          </article>`;
      }).join("");
    }

    function renderTaskList() {
      const visible = getSortedTasks(filteredTasks());
      if (!visible.length) {
        els.taskList.innerHTML = `<div class="empty-state">${t("noMatching")}</div>`;
        return;
      }
      els.taskList.innerHTML = visible.map(task => {
        const level = riskLevel(task);
        const message = task.done ? t("completedExcluded") : Number(task.postponed) >= 2 ? t("postponeWeighted") : (dayDiffFromReference(task.due) <= 2 && Number(task.progress) < 50) ? t("urgentLowProgress") : t("sortedByAdaptive");
        return `
          <article class="task-row ${task.done ? "is-done" : ""}" style="${subjectStyle(task.subject)}">
            <div class="task-main">
              <div class="task-title-row"><h4>${escapeHtml(task.title)}</h4></div>
              <p>${message}</p>
              <div class="task-meta">
                <span class="chip" style="${subjectChipStyle(task.subject)}">${escapeHtml(task.subject)}</span>
                <span class="chip ${level}">${ddayLabel(task)} · ${formatShortDate(task.due)}</span>
                ${Number(task.postponed) > 0 ? `<span class="chip warning">${task.postponed}${lang === "ko" ? "회 미룸" : " postponed"}</span>` : ""}
                <span class="chip">${importanceText(task.importance)}</span>
              </div>
              <div class="progress-wrap"><div class="progress-track"><div class="progress-bar" style="width:${Number(task.progress)}%"></div></div><div class="progress-text">${Number(task.progress)}%</div></div>
            </div>
            <div class="task-actions">
              <button class="pill-btn" type="button" onclick="toggleTaskDone('${task.id}')">${task.done ? t("undo") : t("complete")}</button>
              ${!task.done ? `<button class="pill-btn" type="button" onclick="postponeTask('${task.id}')">${t("postponeOneDay")}</button>` : ""}
              <button class="ghost-btn" type="button" onclick="editTask('${task.id}')">${t("edit")}</button>
              <button class="pill-btn delete" type="button" onclick="deleteTask('${task.id}')">${t("delete")}</button>
            </div>
          </article>`;
      }).join("");
    }

    function renderFocusBlocks() {
      const pending = tasks.filter(task => !task.done);
      if (!pending.length) {
        els.focusBlocks.innerHTML = `<div class="empty-state">${t("noFocus")}</div>`;
        return;
      }
      const slots = ["오전", "오후", "저녁", "야간"];
      const html = slots.map(slot => {
        const top = getSortedTasks(pending.filter(task => task.slot === slot))[0];
        if (!top) return "";
        return `<div class="focus-block" style="${subjectStyle(top.subject)}"><div class="focus-time">${slotTime(slot)}</div><div class="focus-task">${escapeHtml(top.title)}</div><span class="mini-badge" style="${subjectChipStyle(top.subject)}">${escapeHtml(top.subject)}</span></div>`;
      }).join("");
      els.focusBlocks.innerHTML = html || `<div class="empty-state">${t("noFocusSlot")}</div>`;
    }

    function renderFormState() {
      if (editingTaskId) {
        els.formTitle.textContent = t("formEditTitle");
        els.formCaption.textContent = t("formEditCaption");
        els.submitTaskBtn.textContent = t("saveEdit");
        els.resetFormBtn.textContent = t("cancelEdit");
      } else {
        els.formTitle.textContent = t("formAddTitle");
        els.formCaption.textContent = t("formAddCaption");
        els.submitTaskBtn.textContent = t("addTask");
        els.resetFormBtn.textContent = t("resetInput");
      }
      renderPalette();
    }

    function updateView() {
      applyStaticText();
      renderSubjectFilter();
      renderSummary();
      renderCalendar();
      renderSubjectBoard();
      renderTopThree();
      renderTaskList();
      renderFocusBlocks();
      renderFormState();
      saveTasks();
      saveSubjectColors();
    }

    function resetForm() {
      editingTaskId = null;
      els.taskForm.reset();
      els.taskDue.value = selectedDateKey;
      els.taskProgress.value = 30;
      els.progressValue.textContent = "30%";
      els.taskImportance.value = "3";
      els.taskHours.value = "1";
      els.taskSlot.value = "저녁";
      selectedColorKey = PASTEL_COLORS[Object.keys(subjectColors).length % PASTEL_COLORS.length].key;
      renderFormState();
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 2500);
    }

    window.toggleTaskDone = (id) => {
      const task = tasks.find(item => item.id === id);
      if (!task) return;
      task.done = !task.done;
      if (task.done) task.progress = 100;
      saveTasks(); updateView(); showToast(task.done ? t("doneToast") : t("undoneToast"));
    };

    window.postponeTask = (id) => {
      const task = tasks.find(item => item.id === id);
      if (!task) return;
      task.due = addDaysToKey(task.due, 1);
      task.postponed = Number(task.postponed || 0) + 1;
      task.done = false;
      selectedDateKey = task.due;
      currentMonth = startOfMonthKey(selectedDateKey);
      saveTasks(); updateView(); showToast(t("postponedToast"));
    };

    window.deleteTask = (id) => {
      if (!confirm(t("deleteConfirm"))) return;
      tasks = tasks.filter(task => task.id !== id);
      if (editingTaskId === id) resetForm();
      saveTasks(); updateView(); showToast(t("deleted"));
    };

    window.editTask = (id) => {
      const task = tasks.find(item => item.id === id);
      if (!task) return;
      editingTaskId = id;
      els.taskTitle.value = task.title;
      els.taskSubject.value = task.subject;
      els.taskDue.value = task.due;
      els.taskImportance.value = String(task.importance);
      els.taskHours.value = String(task.hours);
      els.taskProgress.value = Number(task.progress);
      els.progressValue.textContent = `${Number(task.progress)}%`;
      els.taskSlot.value = task.slot;
      selectedColorKey = getSubjectColorKey(task.subject);
      renderFormState();
      els.taskTitle.focus();
      showToast(t("editToast"));
    };

    els.themeToggleBtn.addEventListener("click", () => {
      settings.theme = settings.theme === "dark" ? "light" : "dark";
      saveSettings();
      updateView();
    });

    els.languageToggleBtn.addEventListener("click", () => {
      lang = lang === "ko" ? "en" : "ko";
      settings.language = lang;
      saveSettings();
      updateView();
    });

    els.taskProgress.addEventListener("input", event => els.progressValue.textContent = `${event.target.value}%`);
    els.taskSubject.addEventListener("input", renderPalette);
    els.subjectColorPalette.addEventListener("click", event => {
      const button = event.target.closest(".palette-btn");
      if (!button) return;
      selectedColorKey = button.dataset.colorKey;
      renderPalette();
    });

    els.taskForm.addEventListener("submit", event => {
      event.preventDefault();
      const title = els.taskTitle.value.trim();
      const subject = els.taskSubject.value.trim();
      if (!title || !subject) { showToast(t("titleSubjectRequired")); return; }
      if (!subjectColors[subject]) subjectColors[subject] = selectedColorKey;
      const data = normalizeTask({
        id: editingTaskId || makeId(),
        title,
        subject,
        due: els.taskDue.value,
        importance: els.taskImportance.value,
        hours: els.taskHours.value,
        progress: els.taskProgress.value,
        slot: els.taskSlot.value
      });
      data.done = Number(data.progress) >= 100;
      if (editingTaskId) {
        const index = tasks.findIndex(task => task.id === editingTaskId);
        if (index >= 0) {
          data.postponed = tasks[index].postponed;
          if (tasks[index].subject !== data.subject && !subjectColors[data.subject]) subjectColors[data.subject] = selectedColorKey;
          tasks[index] = data;
        }
        showToast(t("updated"));
      } else {
        tasks.push(data);
        showToast(t("added"));
      }
      selectedDateKey = data.due;
      currentMonth = startOfMonthKey(selectedDateKey);
      saveTasks(); saveSubjectColors(); resetForm(); updateView();
    });

    els.resetFormBtn.addEventListener("click", resetForm);
    els.prevDayBtn.addEventListener("click", () => { selectedDateKey = addDaysToKey(selectedDateKey, -1); currentMonth = startOfMonthKey(selectedDateKey); updateView(); });
    els.nextDayBtn.addEventListener("click", () => { selectedDateKey = addDaysToKey(selectedDateKey, 1); currentMonth = startOfMonthKey(selectedDateKey); updateView(); });
    els.todayBtn.addEventListener("click", () => { selectedDateKey = todayKey(); currentMonth = startOfMonthKey(selectedDateKey); updateView(); });
    els.prevMonthBtn.addEventListener("click", () => { currentMonth.setMonth(currentMonth.getMonth() - 1); renderCalendar(); });
    els.nextMonthBtn.addEventListener("click", () => { currentMonth.setMonth(currentMonth.getMonth() + 1); renderCalendar(); });
    els.calendarGrid.addEventListener("click", event => {
      const cell = event.target.closest(".day-cell[data-date]");
      if (!cell) return;
      selectedDateKey = cell.dataset.date;
      currentMonth = startOfMonthKey(selectedDateKey);
      updateView();
    });
    els.subjectBoard.addEventListener("click", event => {
      const card = event.target.closest(".subject-card");
      if (!card) return;
      activeFilter = activeFilter === card.dataset.subject ? "all" : card.dataset.subject;
      els.subjectFilter.value = activeFilter === "all" ? "all" : activeFilter;
      $$(".filter-tabs .pill-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.filter === "all" && activeFilter === "all"));
      updateView();
    });
    $$(".filter-tabs .pill-btn").forEach(button => {
      button.addEventListener("click", event => {
        $$(".filter-tabs .pill-btn").forEach(btn => btn.classList.remove("active"));
        event.target.classList.add("active");
        activeFilter = event.target.dataset.filter;
        if (["all", "todo", "done", "selected"].includes(activeFilter)) els.subjectFilter.value = "all";
        updateView();
      });
    });
    els.searchInput.addEventListener("input", renderTaskList);
    els.subjectFilter.addEventListener("change", event => {
      activeFilter = event.target.value;
      $$(".filter-tabs .pill-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.filter === "all" && activeFilter === "all"));
      updateView();
    });
    els.sortMode.addEventListener("change", () => { renderTopThree(); renderTaskList(); renderFocusBlocks(); });

    settings.theme = settings.theme === "dark" ? "dark" : "light";
    lang = settings.language === "en" ? "en" : "ko";
    applyStaticText();
    resetForm();
    updateView();
  </script>
</body>
</html>
